<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link
			rel="icon"
			type="image/svg+xml"
			href="%VITE_BASE_URL%logo.ico"
		/>
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<title>react-app-scaffold</title>
		<script>
			// FOUC 방지: React 마운트 전에 저장된 테마를 미리 적용
			(function () {
				try {
					// 저장 키는 .env 의 VITE_THEME_STORAGE_KEY 를 Vite 가 빌드시 치환 (src/config/theme.config.ts 와 동일 소스)
					var stored = localStorage.getItem('%VITE_THEME_STORAGE_KEY%');
					var isDark =
						stored === 'dark' ||
						(!stored && window.matchMedia('(prefers-color-scheme: dark)').matches);
					if (isDark) document.documentElement.classList.add('dark');
				} catch (e) {}
			})();
		</script>
	</head>
	<body>
		<div id="root"></div>
		<script
			type="module"
			src="/src/main.tsx"
		></script>
	</body>
</html>
