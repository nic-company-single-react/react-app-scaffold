<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="50" height="50" role="img" aria-label="Loading">
	<defs>
		<linearGradient id="sampleArc" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#0ea5e9" />
			<stop offset="100%" stop-color="#6366f1" />
		</linearGradient>
	</defs>

	<!-- 트랙 -->
	<circle cx="25" cy="25" r="20" fill="none" stroke="rgba(148,163,184,0.25)" stroke-width="5" />

	<!-- 회전 아크 — SMIL 애니메이션이라 <img> 로 써도 스스로 돈다(= GIF 처럼 이미 움직이는 이미지) -->
	<circle cx="25" cy="25" r="20" fill="none" stroke="url(#sampleArc)" stroke-width="5" stroke-linecap="round" stroke-dasharray="80 45">
		<animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 25 25" to="360 25 25" dur="0.9s" repeatCount="indefinite" />
	</circle>
</svg>
